<h1>{{ portalName }}</h1>

<p>
  Manage your courses, monitor your progress and stay updated with your academic journey.
</p>

<div class="stats">
  <div>Courses Available: {{ courseCount }}</div>
  <div>Enrolled: 3</div>
  <div>GPA: 3.8</div>
</div>

<hr>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<hr>

<h2>Course Search</h2>

<input
  type="text"
  [(ngModel)]="searchTerm"
  placeholder="Search courses">

<p>Searching for: {{ searchTerm }}</p>
